<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HairBase</title>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 320px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      font: inherit;
    }

    button {
      background: orange;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ff9900;
    }

    #app {
      display: none;
    }

    .customer {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .msg {
      margin-top: 12px;
      font-size: 14px;
      color: #444;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div class="card" id="login">
    <h2>Salon Login</h2>
    <input id="email" type="email" placeholder="E-Mail" />
    <input id="password" type="password" placeholder="Passwort" />
    <button id="loginBtn" type="button">Anmelden</button>
    <div id="msg" class="msg"></div>
  </div>

  <!-- APP -->
  <div class="card" id="app">
    <h2>Kunden</h2>
    <div id="customers"></div>

    <input id="newName" placeholder="Neuer Kunde (Vorname)" />
    <button id="saveBtn" type="button">Speichern</button>
    <div id="appMsg" class="msg"></div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://rgvjhcmeclnautmwiseo.supabase.co",
      "sb_publishable_h2gH6NsfbbHOAhcIKBgzlg_iCReqKux"
    );

    const loginBox = document.getElementById("login");
    const appBox = document.getElementById("app");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");
    const customersBox = document.getElementById("customers");
    const newNameInput = document.getElementById("newName");
    const saveBtn = document.getElementById("saveBtn");
    const appMsg = document.getElementById("appMsg");

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        msg.innerText = "Bitte E-Mail und Passwort eingeben.";
        return;
      }

      msg.innerText = "Lade...";

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        msg.innerText = "Fehler: " + error.message;
        return;
      }

      msg.innerText = "";
      loginBox.style.display = "none";
      appBox.style.display = "block";
      await loadCustomers();
    }

    async function loadCustomers() {
      customersBox.innerHTML = "";
      appMsg.innerText = "";

      const { data, error } = await supabaseClient
        .from("customers")
        .select("*");

      if (error) {
        appMsg.innerText = "Fehler beim Laden: " + error.message;
        console.log(error);
        return;
      }

      if (!data || data.length === 0) {
        customersBox.innerHTML = '<div class="customer">Noch keine Kunden vorhanden.</div>';
        return;
      }

      data.forEach(c => {
        const div = document.createElement("div");
        div.className = "customer";
        div.innerText = c.first_name || "Kunde";
        customersBox.appendChild(div);
      });
    }

    async function addCustomer() {
      const name = newNameInput.value.trim();

      if (!name) {
        appMsg.innerText = "Bitte einen Namen eingeben.";
        return;
      }

      appMsg.innerText = "Speichere...";

      const { error } = await supabaseClient
        .from("customers")
        .insert([{ first_name: name }]);

      if (error) {
        appMsg.innerText = "Fehler beim Speichern: " + error.message;
        console.log(error);
        return;
      }

      newNameInput.value = "";
      appMsg.innerText = "Gespeichert.";
      await loadCustomers();
    }

    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();

      if (data && data.session) {
        loginBox.style.display = "none";
        appBox.style.display = "block";
        await loadCustomers();
      }
    }

    loginBtn.addEventListener("click", login);
    saveBtn.addEventListener("click", addCustomer);

    passwordInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") login();
    });

    newNameInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") addCustomer();
    });

    checkSession();
  </script>

</body>
</html>
