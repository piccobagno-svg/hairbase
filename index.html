<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HairBase</title>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 320px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      background: orange;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ff9900;
    }

    #app { display: none; }

    .customer {
      padding: 8px;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="login">
  <h2>Salon Login</h2>
  <input id="email" type="email" placeholder="E-Mail" />
  <input id="password" type="password" placeholder="Passwort" />
  <button onclick="login()">Anmelden</button>
  <div id="msg"></div>
</div>

<!-- APP -->
<div class="card" id="app">
  <h2>Kunden</h2>
  <div id="customers"></div>

  <input id="newName" placeholder="Neuer Kunde (Name)" />
  <button onclick="addCustomer()">Speichern</button>
</div>

<script>
  const supabaseClient = supabase.createClient(
    "https://rgvjhcmeclnautmwiseo.supabase.co",
    "sb_publishable_h2gH6NsfbbHOAhcIKBgzlg_iCReqKux"
  );

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    msg.innerText = "Lade...";

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      msg.innerText = "Fehler: " + error.message;
    } else {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      loadCustomers();
    }
  }

  async function loadCustomers() {
    const { data, error } = await supabaseClient
      .from("customers")
      .select("*")
      .order("created_at", { ascending: false });

    const container = document.getElementById("customers");
    container.innerHTML = "";

    if (data) {
      data.forEach(c => {
        const div = document.createElement("div");
        div.className = "customer";
        div.innerText = c.name || "Kunde";
        container.appendChild(div);
      });
    }
  }

  async function addCustomer() {
    const input = document.getElementById("newName");
    const name = input.value.trim();

    if (!name) return;

    const { error } = await supabaseClient
      .from("customers")
      .insert([{ name }]);

    if (!error) {
      input.value = "";
      loadCustomers();
    } else {
      console.log(error);
    }
  }
</script>

</body>
</html>
